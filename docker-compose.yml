services:
  monoscan:
    build:
      context: .
      args:
        MONO_CORE_SDK_REPO: ${MONO_CORE_SDK_REPO:-https://github.com/monolythium-vision/mono-core-sdk.git}
        MONO_CORE_SDK_REF: ${MONO_CORE_SDK_REF:-master}
    ports:
      - "${MONOSCAN_PORT:-8080}:8080"
    environment:
      PORT: 8080
    restart: unless-stopped

services:
  monoscan:
    build:
      context: .
      args:
        MONO_CORE_SDK_REPO: ${MONO_CORE_SDK_REPO:-https://github.com/monolythium/mono-core-sdk.git}
        MONO_CORE_SDK_REF: ${MONO_CORE_SDK_REF:-ffeb897e4b710b4ee993a0c78bdde3f505009ae6}
    ports:
      - "${MONOSCAN_PORT:-8080}:8080"
    environment:
      PORT: 8080
      MONOSCAN_RPC_UPSTREAM: ${MONOSCAN_RPC_UPSTREAM:-http://178.105.15.216:8545}
    restart: unless-stopped
